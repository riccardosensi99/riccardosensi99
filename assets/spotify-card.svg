<svg xmlns="http://www.w3.org/2000/svg" width="900" height="240" viewBox="0 0 900 240" role="img" aria-labelledby="title desc">
  <title id="title">Riccardo's Spotify playlist</title>
  <desc id="desc">A dark glass-style card linking to Riccardo's Spotify playlist.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1DB954" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="8" y="8" width="884" height="224" rx="28" fill="url(#bg)" stroke="#243244" stroke-width="2" filter="url(#shadow)"/>
  <rect x="8" y="8" width="884" height="6" rx="3" fill="url(#glow)"/>

  <circle cx="126" cy="120" r="62" fill="#1DB954"/>
  <path d="M92 101c38-10 80-5 112 12" fill="none" stroke="#07130b" stroke-width="10" stroke-linecap="round"/>
  <path d="M98 124c32-7 66-3 94 11" fill="none" stroke="#07130b" stroke-width="9" stroke-linecap="round"/>
  <path d="M104 146c24-5 49-2 70 8" fill="none" stroke="#07130b" stroke-width="8" stroke-linecap="round"/>

  <text x="225" y="76" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" letter-spacing="3">WHAT I LISTEN TO</text>
  <text x="225" y="120" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="700">Riccardo's Playlist</text>
  <text x="225" y="155" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19">Coding sessions • night drives • riding vibes</text>

  <rect x="225" y="177" width="190" height="38" rx="19" fill="#1DB954"/>
  <text x="320" y="202" text-anchor="middle" fill="#07130b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700" letter-spacing="1">OPEN ON SPOTIFY</text>

  <circle cx="812" cy="56" r="3" fill="#1DB954" opacity="0.9"/>
  <circle cx="836" cy="82" r="2" fill="#38bdf8" opacity="0.8"/>
  <circle cx="794" cy="185" r="2.5" fill="#1DB954" opacity="0.65"/>
  <path d="M744 42h92M744 198h92" stroke="#334155" stroke-width="2" stroke-linecap="round"/>
</svg>
