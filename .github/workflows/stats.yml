name: Generate GitHub activity cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/stats.yml"

jobs:
  generate-stats:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate profile summary cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: main
          UTC_OFFSET: 2
          AUTO_PUSH: false

      - name: Inspect and prepare generated cards
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p profile

          echo "Generated files:"
          find profile-summary-card-output -type f -name '*.svg' -print

          STATS_FILE=$(find profile-summary-card-output -type f -path '*/tokyonight/3-stats.svg' | head -n 1)
          LANGS_FILE=$(find profile-summary-card-output -type f -path '*/tokyonight/1-repos-per-language.svg' | head -n 1)
          DETAILS_FILE=$(find profile-summary-card-output -type f -path '*/tokyonight/0-profile-details.svg' | head -n 1)

          test -n "$STATS_FILE"
          test -n "$LANGS_FILE"
          test -n "$DETAILS_FILE"

          cp "$STATS_FILE" profile/stats.svg
          cp "$LANGS_FILE" profile/top-langs.svg
          cp "$DETAILS_FILE" profile/contributions.svg

      - name: Generate contribution streak card
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const login = context.repo.owner;
            const now = new Date();
            const from = new Date(now);
            from.setUTCFullYear(from.getUTCFullYear() - 1);

            const result = await github.graphql(`
              query($login: String!, $from: DateTime!, $to: DateTime!) {
                user(login: $login) {
                  contributionsCollection(from: $from, to: $to) {
                    contributionCalendar {
                      totalContributions
                      weeks {
                        contributionDays {
                          date
                          contributionCount
                        }
                      }
                    }
                  }
                }
              }
            `, {
              login,
              from: from.toISOString(),
              to: now.toISOString()
            });

            const calendar = result.user.contributionsCollection.contributionCalendar;
            const days = calendar.weeks
              .flatMap((week) => week.contributionDays)
              .sort((a, b) => a.date.localeCompare(b.date));

            let longest = 0;
            let running = 0;
            for (const day of days) {
              if (day.contributionCount > 0) {
                running += 1;
                longest = Math.max(longest, running);
              } else {
                running = 0;
              }
            }

            const today = now.toISOString().slice(0, 10);
            const yesterdayDate = new Date(now);
            yesterdayDate.setUTCDate(yesterdayDate.getUTCDate() - 1);
            const yesterday = yesterdayDate.toISOString().slice(0, 10);

            let current = 0;
            let index = days.length - 1;
            while (index >= 0 && days[index].date > today) index -= 1;
            if (index >= 0 && days[index].date === today && days[index].contributionCount === 0) index -= 1;
            if (index >= 0 && ![today, yesterday].includes(days[index].date)) index = -1;

            while (index >= 0 && days[index].contributionCount > 0) {
              current += 1;
              index -= 1;
            }

            const svg = `
            <svg xmlns="http://www.w3.org/2000/svg" width="760" height="190" viewBox="0 0 760 190" role="img" aria-label="GitHub contribution streak">
              <defs>
                <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
                  <stop offset="0%" stop-color="#70a5fd"/>
                  <stop offset="100%" stop-color="#bf91f3"/>
                </linearGradient>
              </defs>
              <rect width="760" height="190" rx="14" fill="#1a1b27"/>
              <rect x="1" y="1" width="758" height="188" rx="13" fill="none" stroke="#30363d"/>
              <text x="380" y="34" text-anchor="middle" fill="#70a5fd" font-family="Segoe UI, Ubuntu, sans-serif" font-size="18" font-weight="700">Contribution Streak</text>
              <line x1="253" y1="58" x2="253" y2="152" stroke="#30363d"/>
              <line x1="507" y1="58" x2="507" y2="152" stroke="#30363d"/>
              <text x="127" y="102" text-anchor="middle" fill="url(#accent)" font-family="Segoe UI, Ubuntu, sans-serif" font-size="38" font-weight="700">${current}</text>
              <text x="127" y="130" text-anchor="middle" fill="#a9b1d6" font-family="Segoe UI, Ubuntu, sans-serif" font-size="13">Current streak</text>
              <text x="380" y="102" text-anchor="middle" fill="url(#accent)" font-family="Segoe UI, Ubuntu, sans-serif" font-size="38" font-weight="700">${longest}</text>
              <text x="380" y="130" text-anchor="middle" fill="#a9b1d6" font-family="Segoe UI, Ubuntu, sans-serif" font-size="13">Longest streak</text>
              <text x="633" y="102" text-anchor="middle" fill="url(#accent)" font-family="Segoe UI, Ubuntu, sans-serif" font-size="38" font-weight="700">${calendar.totalContributions}</text>
              <text x="633" y="130" text-anchor="middle" fill="#a9b1d6" font-family="Segoe UI, Ubuntu, sans-serif" font-size="13">Contributions this year</text>
              <text x="380" y="170" text-anchor="middle" fill="#565f89" font-family="Segoe UI, Ubuntu, sans-serif" font-size="11">Generated automatically with GitHub Actions</text>
            </svg>`;

            fs.mkdirSync('profile', { recursive: true });
            fs.writeFileSync('profile/streak.svg', svg.trim());

      - name: Commit generated cards
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add profile/*.svg
          if git diff --cached --quiet; then
            echo "No card changes to commit"
            exit 0
          fi

          git commit -m "chore: update GitHub activity cards"
          git push
