name: Generate GitHub activity cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/stats.yml"
      - "scripts/generate_profile_cards.py"

jobs:
  generate-stats:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate profile cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: python3 scripts/generate_profile_cards.py

      - name: Validate generated cards
        run: |
          set -euo pipefail
          test -s profile/stats.svg
          test -s profile/top-langs.svg
          test -s profile/streak.svg
          test -s profile/contributions.svg

      - name: Commit generated cards
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add profile/stats.svg profile/top-langs.svg profile/streak.svg profile/contributions.svg
          if git diff --cached --quiet; then
            echo "No card changes to commit"
            exit 0
          fi

          git commit -m "chore: update GitHub activity cards"
          git push
